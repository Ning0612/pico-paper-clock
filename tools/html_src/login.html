<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Paper Clock / 登入</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a100d'/%3E%3Crect x='2' y='2' width='28' height='28' fill='none' stroke='%23a8d2c4' stroke-width='2'/%3E%3Ctext x='16' y='21' font-family='Consolas,monospace' font-size='12' font-weight='700' fill='%23a8d2c4' text-anchor='middle'%3EPC%3C/text%3E%3C/svg%3E">
<script>(function(){var k='iot-ui-theme',s=null;try{s=localStorage.getItem(k)}catch(e){}document.documentElement.dataset.theme=(s==='light'||s==='dark')?s:(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')})();</script>
<style>
:root{color-scheme:light;--paper:#f1ede2;--surface:#fbf8ef;--surface-2:#e7e3d6;--ink:#17231f;--ink-soft:#263a34;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--teal-dark:#07534f;--coral:#cf5a47;--coral-dark:#a94436;--amber:#bd812d;--amber-dark:#98641d;--shadow:rgba(23,35,31,.15);--inset:#fffdf7;--input-border:#7e9188;--placeholder:#9aa39b;--grid-dot:rgba(23,35,31,.045);--danger-surface:#fff6ed;--mint:#a8d2c4;--on-dark:#fbf8ef;--on-light:#17231f;--dark-block-muted:#aab8ae;--nav-border:#71847a;--on-ring:rgba(168,210,196,.18)}:root[data-theme="dark"]{color-scheme:dark;--paper:#141b18;--surface:#1c2622;--surface-2:#24312c;--ink:#eef1ea;--ink-soft:#0a100d;--line:#3a4a43;--muted:#93a69c;--teal:#1fae9c;--teal-dark:#167d70;--coral:#e2705a;--coral-dark:#b8543f;--amber:#d99a3f;--amber-dark:#a97a2f;--shadow:rgba(0,0,0,.4);--inset:#101512;--input-border:#48584f;--placeholder:#66756c;--grid-dot:rgba(255,255,255,.035);--danger-surface:#241a16}*{box-sizing:border-box}.is-hidden{display:none!important}body{margin:0;background-color:var(--paper);background-image:linear-gradient(var(--grid-dot) 1px,transparent 1px),linear-gradient(90deg,var(--grid-dot) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh}.login-wrap{max-width:22rem;margin:0 auto;padding:2.5rem 1rem 1rem}.login-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem}.brand{display:flex;align-items:center;gap:.7rem;color:var(--ink);text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--teal);color:var(--teal);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:var(--muted);font:400 .68rem Consolas,monospace;letter-spacing:.02em}.theme-toggle{display:flex;border:1px solid var(--line);overflow:hidden}.theme-toggle button{border:0;border-radius:0;padding:.42rem .5rem;background:transparent;color:var(--muted);font:700 .64rem Consolas,monospace;cursor:pointer}.theme-toggle button+button{border-left:1px solid var(--line)}.theme-toggle button.active{background:var(--mint);color:var(--on-light)}.theme-toggle button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}.card{position:relative;background:var(--surface);border:1px solid var(--ink);padding:1.25rem;box-shadow:5px 5px 0 var(--line)}.card:before{content:'';position:absolute;top:0;left:0;width:42px;height:4px;background:var(--teal)}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.card h1{font-size:2.1rem;line-height:.95;letter-spacing:-.06em;margin:.45rem 0 .8rem}.card p{color:var(--muted);line-height:1.5;margin:.5rem 0 1.1rem}.field{margin-bottom:.85rem}label{display:block;margin-bottom:.3rem;color:var(--muted);font:700 .72rem Consolas,monospace}input,button{font:700 .88rem Consolas,monospace}input{width:100%;padding:.68rem;border:1px solid var(--input-border);border-radius:0;background:var(--inset);color:var(--ink)}input:focus{outline:2px solid var(--mint);outline-offset:1px;border-color:var(--teal)}input::placeholder{color:var(--placeholder);font-weight:400}.actions{display:flex;gap:.6rem}.actions button{flex:1;border:1px solid var(--teal-dark);border-radius:0;padding:.7rem .85rem;background:var(--teal);color:#fff;cursor:pointer}.actions button:hover{background:var(--teal-dark)}button:disabled{opacity:.55;cursor:wait}button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}.message{display:none;margin-bottom:1rem;padding:.8rem 1rem;border:1px solid var(--coral);border-left:5px solid var(--coral);background:var(--surface);color:var(--coral);font:700 .8rem Consolas,monospace}.info{margin-top:1rem!important;padding:.65rem .75rem;background:var(--surface-2);border-left:3px solid var(--teal);font:400 .72rem Consolas,monospace!important}.site-footer{background:var(--ink-soft);color:var(--dark-block-muted);margin-top:2rem;padding:1.2rem 1rem}.footer-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.footer-repo{display:flex;align-items:baseline;gap:.5rem;font:700 .74rem Consolas,monospace}.footer-repo .label{color:var(--mint);letter-spacing:.12em}.footer-repo a{color:var(--on-dark);text-decoration:none}.footer-meta{font:400 .7rem Consolas,monospace}@media(max-width:480px){.login-wrap{padding-top:1.5rem}.login-head{align-items:flex-start;flex-direction:column}.footer-in{align-items:flex-start;flex-direction:column}}
</style>
<style>.actions button{color:var(--on-dark)}</style>
</head>
<body>
<main class="login-wrap"><div class="login-head"><a class="brand" href="/login"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a><div class="theme-toggle" role="group" aria-label="配色主題切換"><button type="button" data-theme-choice="light" aria-pressed="false">LIGHT</button><button type="button" data-theme-choice="dark" aria-pressed="false">DARK</button></div></div><section class="card"><div class="kicker">01 / access</div><h1 id="title">登入</h1><p id="intro">使用固定管理帳號 admin 進入裝置控制台。</p><div class="message" id="message" aria-live="polite"></div><form id="loginForm"><div class="field"><label for="password">管理密碼</label><input id="password" name="password" type="password" autocomplete="current-password" required></div><div class="field is-hidden" id="confirmField"><label for="passwordConfirm">確認管理密碼</label><input id="passwordConfirm" name="password_confirm" type="password" autocomplete="new-password"></div><div class="actions"><button type="submit" id="submit">登入</button></div></form><p class="info" id="securityNote">此裝置目前使用區域 HTTP；請只在可信任的 LAN／AP 管理介面登入。</p></section></main>
<footer class="site-footer"><div class="footer-in"><div class="footer-repo"><span class="label">SOURCE</span><a href="https://github.com/Ning0612/pico-paper-clock">Ning0612/pico-paper-clock</a></div><div class="footer-meta">Vanilla HTML／CSS／JS · 無框架 · MIT License</div></div></footer>
<script>
var form=document.getElementById('loginForm'),message=document.getElementById('message'),submitButton=document.getElementById('submit'),authStatus=null,next=new URLSearchParams(location.search).get('next')||'/';if(!next.startsWith('/')||next.startsWith('//')||next.includes('\\'))next='/';
function syncTheme(){var cur=document.documentElement.dataset.theme;document.querySelectorAll('.theme-toggle button').forEach(function(b){var on=b.dataset.themeChoice===cur;b.classList.toggle('active',on);b.setAttribute('aria-pressed',on?'true':'false')})}function setTheme(value){if(value!=='light'&&value!=='dark')value='light';document.documentElement.dataset.theme=value;try{localStorage.setItem('iot-ui-theme',value)}catch(e){}syncTheme()}document.querySelectorAll('.theme-toggle button').forEach(function(b){b.onclick=function(){setTheme(b.dataset.themeChoice)}});syncTheme();
function show(text){message.textContent=text;message.style.display='block'}
async function readStatus(){var response=await fetch('/api/v1/auth/status',{cache:'no-store'}),data=await response.json();if(!response.ok)throw new Error(data.message||('HTTP '+response.status));return data}
function applyStatus(value){authStatus=value;if(authStatus.authenticated){location.href=next;return}var confirmField=document.getElementById('confirmField');confirmField.classList.toggle('is-hidden',!authStatus.setup_required);document.getElementById('password').autocomplete=authStatus.setup_required?'new-password':'current-password';if(authStatus.setup_required){document.getElementById('title').textContent='設定管理密碼';document.getElementById('intro').textContent='第一次使用前，請先建立固定管理帳號 admin 的密碼。';submitButton.textContent='建立密碼'}else{document.getElementById('title').textContent='登入';document.getElementById('intro').textContent='使用固定管理帳號 admin 進入裝置控制台。';submitButton.textContent='登入'}}
async function loadStatus(){try{applyStatus(await readStatus())}catch(error){show('暫時無法連線：請確認已連上裝置的 Wi-Fi。')}}
async function submitLogin(retried){try{applyStatus(await readStatus());if(authStatus.authenticated)return}catch(error){show('暫時無法連線：請確認已連上裝置的 Wi-Fi。');return}var password=document.getElementById('password').value,confirmPassword=document.getElementById('passwordConfirm').value;if(authStatus.setup_required&&password!==confirmPassword){show('兩次輸入的管理密碼不一致。');return}submitButton.disabled=true;submitButton.textContent=authStatus.setup_required?'建立中…':'登入中…';try{var values={password:password,password_confirm:confirmPassword,csrf_token:authStatus.csrf_token,next:next},response=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(values).toString()}),data={};try{data=await response.json()}catch(e){}if(!response.ok){if(data.error==='csrf'&&!retried){applyStatus(await readStatus());return submitLogin(true)}throw new Error(data.message||('HTTP '+response.status))}location.href=data.redirect||next||'/'}catch(error){show(error.message);submitButton.disabled=false;submitButton.textContent=authStatus.setup_required?'建立密碼':'登入'}}
form.onsubmit=function(event){event.preventDefault();if(authStatus)submitLogin(false)};loadStatus();
</script>
</body>
</html>
