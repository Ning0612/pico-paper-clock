<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Clock 圖片庫</title>
<style>
:root{--paper:#f2efe6;--ink:#182126;--muted:#657077;--line:#bfc5bd;--blue:#006f8b;--blue2:#004d61;--red:#a83b2b;--white:#fffdf7;--shadow:rgba(24,33,38,.14)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh;background-image:linear-gradient(rgba(24,33,38,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(24,33,38,.035) 1px,transparent 1px);background-size:18px 18px}.mast{background:var(--ink);color:var(--white);padding:1rem;border-bottom:5px solid var(--blue)}.mast-in{max-width:880px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{margin:0;font-size:1.15rem;letter-spacing:.08em}.live{font:700 .72rem Consolas,monospace;color:#8ee5d1;border:1px solid #42766e;padding:.3rem .5rem}.wrap{max-width:880px;margin:auto;padding:1rem}.hero{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:end;margin:1rem 0 1.25rem}.hero h1{font-size:clamp(2rem,8vw,4.2rem);line-height:.9;margin:0;letter-spacing:-.06em}.hero p{margin:.55rem 0 0;color:var(--muted);max-width:34rem}.storage{font:700 .8rem Consolas,monospace;border-left:4px solid var(--blue);padding:.65rem .8rem;background:var(--white);box-shadow:3px 3px 0 var(--line)}.nav{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}.btn,.tab{border:1px solid var(--ink);background:var(--white);color:var(--ink);padding:.62rem .8rem;text-decoration:none;font:700 .8rem Consolas,monospace;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .12s,box-shadow .12s}.btn:hover,.tab:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue2)}.btn.danger{color:var(--red);border-color:var(--red);box-shadow:2px 2px 0 var(--red)}.controls{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;padding:.8rem;border:1px solid var(--line);background:rgba(255,253,247,.72)}label{font:700 .76rem Consolas,monospace}input,select{border:1px solid var(--ink);padding:.55rem;background:#fff;font:700 .86rem Consolas,monospace}#eventBox{display:none}.panel{margin-top:1rem;background:var(--white);border:1px solid var(--ink);box-shadow:5px 5px 0 var(--line)}.panel-head{display:grid;grid-template-columns:1fr auto;padding:.75rem 1rem;border-bottom:1px solid var(--ink);font:700 .75rem Consolas,monospace;text-transform:uppercase;letter-spacing:.08em}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:1rem;align-items:center;padding:.85rem 1rem;border-bottom:1px dashed var(--line)}.row:last-child{border-bottom:0}.name{font:700 .9rem Consolas,monospace;overflow-wrap:anywhere}.meta{font:400 .72rem Consolas,monospace;color:var(--muted);margin-top:.2rem}.actions{display:flex;gap:.45rem}.actions .btn{padding:.42rem .55rem;box-shadow:none}.empty{padding:2.5rem 1rem;text-align:center;color:var(--muted);font-style:italic}.notice{display:none;margin-top:1rem;padding:.8rem;border-left:5px solid var(--blue);background:var(--white);font:700 .8rem Consolas,monospace}.notice.error{border-color:var(--red);color:var(--red)}@media(max-width:600px){.hero{grid-template-columns:1fr}.hero h1{font-size:3rem}.storage{justify-self:start}.row{grid-template-columns:1fr}.actions{justify-content:flex-start}.panel-head span:last-child{display:none}}
</style>
</head>
<body>
<header class="mast"><div class="mast-in"><h2 class="brand">PI PAPER CLOCK / IMAGE ARCHIVE</h2><span class="live">LOCAL DEVICE</span></div></header>
<main class="wrap">
<section class="hero"><div><h1>圖片庫</h1><p>查看裝置中的電子紙素材、立即預覽，或移除不再使用的圖片。原圖轉檔與上傳請使用電腦端 Pico Image Tool。</p></div><div class="storage" id="storage">STORAGE --</div></section>
<nav class="nav"><a class="btn" href="/">設定</a><a class="btn" href="/dashboard">在席統計</a><button class="tab active" data-kind="custom">CUSTOM</button><button class="tab" data-kind="events">EVENTS</button><button class="tab" data-kind="login">LOGIN</button></nav>
<section class="controls"><span id="eventBox"><label for="event">EVENT</label> <input id="event" value="0101" maxlength="8" size="9"></span><button class="btn" id="reload">重新整理</button></section>
<div class="notice" id="notice"></div>
<section class="panel"><div class="panel-head"><span>FILE / SIZE</span><span>ACTIONS</span></div><div id="list"><div class="empty">讀取中…</div></div></section>
</main>
<script>
let kind='custom';
const list=document.getElementById('list'),notice=document.getElementById('notice'),storage=document.getElementById('storage'),eventBox=document.getElementById('eventBox'),eventInput=document.getElementById('event');
function eventValue(){return eventInput.value.trim()||'0101'}
function apiPath(name){if(kind==='events')return '/api/v1/images/events/'+encodeURIComponent(eventValue())+'/'+encodeURIComponent(name);return '/api/v1/images/'+kind+'/'+encodeURIComponent(name)}
function show(message,error){notice.textContent=message;notice.className='notice'+(error?' error':'');notice.style.display='block';setTimeout(()=>notice.style.display='none',5000)}
function sizeText(n){return n>=1024?(n/1024).toFixed(1)+' KiB':n+' B'}
async function load(){list.innerHTML='<div class="empty">讀取中…</div>';let url='/api/v1/images?collection='+kind;if(kind==='events')url+='&event='+encodeURIComponent(eventValue());try{const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error('HTTP '+response.status);const data=await response.json();storage.textContent='FREE '+(data.fs_free<0?'--':sizeText(data.fs_free));list.innerHTML='';if(!data.items.length){list.innerHTML='<div class="empty">這個分類目前沒有圖片</div>';return}data.items.forEach(item=>{const row=document.createElement('div');row.className='row';const info=document.createElement('div');const name=document.createElement('div');name.className='name';name.textContent=item.name;const meta=document.createElement('div');meta.className='meta';meta.textContent=sizeText(item.bytes)+(item.event?' / '+item.event:'');info.append(name,meta);const actions=document.createElement('div');actions.className='actions';const preview=document.createElement('button');preview.className='btn';preview.textContent='預覽';preview.onclick=()=>act(item.name,'preview');const remove=document.createElement('button');remove.className='btn danger';remove.textContent='刪除';remove.onclick=()=>act(item.name,'delete');actions.append(preview,remove);row.append(info,actions);list.append(row)})}catch(error){list.innerHTML='<div class="empty">無法讀取圖片清單</div>';show(error.message,true)}}
async function act(name,action){if(action==='delete'&&!confirm('確定刪除 '+name+'？此操作無法復原。'))return;const url=apiPath(name)+(action==='preview'?'/preview':'');try{const response=await fetch(url,{method:action==='preview'?'POST':'DELETE',headers:{'X-Pico-Clock-API':'1'}});const data=await response.json();if(!response.ok)throw new Error(data.message||('HTTP '+response.status));show(action==='preview'?'已排入電子紙預覽':'已刪除 '+name,false);if(action==='delete')load()}catch(error){show(error.message,true)}}
document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{document.querySelectorAll('.tab').forEach(item=>item.classList.remove('active'));tab.classList.add('active');kind=tab.dataset.kind;eventBox.style.display=kind==='events'?'inline':'none';load()});
document.getElementById('reload').onclick=load;eventInput.onchange=load;load();
</script>
</body>
</html>
