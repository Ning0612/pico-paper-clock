<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Paper Clock / 圖片庫</title>
<style>
:root{--ink:#17231f;--ink-soft:#263a34;--paper:#f1ede2;--surface:#fbf8ef;--surface-2:#e7e3d6;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--teal-dark:#07534f;--coral:#cf5a47;--mint:#a8d2c4;--shadow:rgba(23,35,31,.15)}
*{box-sizing:border-box}body{margin:0;background-color:var(--paper);background-image:linear-gradient(rgba(23,35,31,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(23,35,31,.045) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh}.topbar{background:var(--ink);border-bottom:5px solid var(--coral);color:var(--surface);padding:1rem}.topbar-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.7rem;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--mint);color:var(--mint);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:#aab8ae;font:400 .68rem Consolas,monospace;letter-spacing:.02em}.nav{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}.nav a{border:1px solid #71847a;color:var(--surface);padding:.46rem .6rem;text-decoration:none;font:700 .72rem Consolas,monospace}.nav a:hover,.nav a.active{background:var(--mint);border-color:var(--mint);color:var(--ink)}.wrap{max-width:1040px;margin:auto;padding:1.4rem 1rem 3rem}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.intro{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin:.4rem 0 1.25rem}.intro h1{font-size:clamp(2rem,6vw,4rem);line-height:.92;letter-spacing:-.06em;margin:.45rem 0 0}.intro p{max-width:34rem;margin:0;color:var(--muted);line-height:1.55}.storage{padding:.7rem .85rem;border-left:4px solid var(--mint);background:var(--ink-soft);color:var(--surface);font:700 .75rem Consolas,monospace;white-space:nowrap;box-shadow:4px 4px 0 var(--line)}.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;padding:.8rem;background:var(--surface-2);border:1px solid var(--line);margin-bottom:1rem}.tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.65rem}.btn,.tab{border:1px solid var(--ink);border-radius:0;background:var(--surface);color:var(--ink);padding:.62rem .8rem;text-decoration:none;font:700 .76rem Consolas,monospace;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .12s,box-shadow .12s,background .12s}.btn:hover,.tab:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}.tab.active{background:var(--teal);border-color:var(--teal-dark);color:#fff}.btn.danger{color:var(--coral);border-color:var(--coral);box-shadow:2px 2px 0 var(--coral)}.btn.danger:hover{background:#fff0e8}.controls input{width:92px;border:1px solid var(--ink);border-radius:0;padding:.55rem .6rem;background:#fffdf7;color:var(--ink);font:700 .8rem Consolas,monospace}.controls label{color:var(--muted);font:700 .72rem Consolas,monospace}.notice{display:none;margin:0 0 1rem;padding:.8rem 1rem;border:1px solid var(--teal);border-left:5px solid var(--teal);background:var(--surface);font:700 .8rem Consolas,monospace}.notice.error{border-color:var(--coral);color:var(--coral)}.panel{background:var(--surface);border:1px solid var(--ink);box-shadow:5px 5px 0 var(--line)}.panel-head{display:grid;grid-template-columns:1fr auto;padding:.75rem 1rem;border-bottom:1px solid var(--ink);font:700 .7rem Consolas,monospace;letter-spacing:.08em;color:var(--teal-dark)}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:1rem;align-items:center;padding:.9rem 1rem;border-bottom:1px dashed var(--line)}.row:last-child{border-bottom:0}.name{font:700 .88rem Consolas,monospace;overflow-wrap:anywhere}.meta{margin-top:.25rem;color:var(--muted);font:400 .72rem Consolas,monospace}.actions{display:flex;gap:.45rem}.actions .btn{padding:.42rem .55rem;box-shadow:none}.empty{padding:2.8rem 1rem;text-align:center;color:var(--muted);font-style:italic}.mark{display:inline-block;margin-right:.35rem;color:var(--teal)}@media(max-width:720px){.topbar-in,.intro{align-items:flex-start;flex-direction:column}.nav{justify-content:flex-start}.storage{align-self:flex-start}.wrap{padding-top:1rem}}@media(max-width:560px){.row{grid-template-columns:1fr}.actions{justify-content:flex-start}.panel-head span:last-child{display:none}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-in"><a class="brand" href="/"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a><nav class="nav"><a href="/">設定</a><a href="/dashboard">在席統計</a><a class="active" href="/images">圖片庫</a></nav></div></header>
<main class="wrap">
<div class="intro"><div><div class="kicker">03 / image library</div><h1>圖片庫</h1></div><div class="storage" id="storage">FREE / --</div></div>
<p class="description">查看裝置中的電子紙素材、立即預覽，或移除不再使用的圖片。原圖轉檔與上傳請使用電腦端 Pico Image Tool。</p>
<div class="tabs"><a class="btn" href="/">回到設定</a><a class="btn" href="/dashboard">在席統計</a><button class="tab active" data-kind="custom">CUSTOM</button><button class="tab" data-kind="events">EVENTS</button><button class="tab" data-kind="login">LOGIN</button></div>
<section class="controls"><span id="eventBox" style="display:none"><label for="event">EVENT / </label><input id="event" value="0101" maxlength="8" size="9"></span><button class="btn" id="reload"><span class="mark">↻</span>重新整理</button></section>
<div class="notice" id="notice"></div>
<section class="panel"><div class="panel-head"><span>FILE / SIZE</span><span>ACTIONS</span></div><div id="list"><div class="empty">讀取中…</div></div></section>
</main>
<script>
let kind='custom';const list=document.getElementById('list'),notice=document.getElementById('notice'),storage=document.getElementById('storage'),eventBox=document.getElementById('eventBox'),eventInput=document.getElementById('event');function eventValue(){return eventInput.value.trim()||'0101'}function apiPath(name){if(kind==='events')return '/api/v1/images/events/'+encodeURIComponent(eventValue())+'/'+encodeURIComponent(name);return '/api/v1/images/'+kind+'/'+encodeURIComponent(name)}function show(message,error){notice.textContent=message;notice.className='notice'+(error?' error':'');notice.style.display='block';setTimeout(()=>notice.style.display='none',5000)}function sizeText(n){return n>=1024?(n/1024).toFixed(1)+' KiB':n+' B'}
async function load(){list.innerHTML='<div class="empty">讀取中…</div>';let url='/api/v1/images?collection='+kind;if(kind==='events')url+='&event='+encodeURIComponent(eventValue());try{const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error('HTTP '+response.status);const data=await response.json();storage.textContent='FREE / '+(data.fs_free<0?'--':sizeText(data.fs_free));list.innerHTML='';if(!data.items.length){list.innerHTML='<div class="empty">這個分類目前沒有圖片</div>';return}data.items.forEach(item=>{const row=document.createElement('div');row.className='row';const info=document.createElement('div');const name=document.createElement('div');name.className='name';name.textContent=item.name;const meta=document.createElement('div');meta.className='meta';meta.textContent=sizeText(item.bytes)+(item.event?' / '+item.event:'');info.append(name,meta);const actions=document.createElement('div');actions.className='actions';const preview=document.createElement('button');preview.className='btn';preview.textContent='預覽';preview.onclick=()=>act(item.name,'preview');const remove=document.createElement('button');remove.className='btn danger';remove.textContent='刪除';remove.onclick=()=>act(item.name,'delete');actions.append(preview,remove);row.append(info,actions);list.append(row)})}catch(error){list.innerHTML='<div class="empty">無法讀取圖片清單</div>';show(error.message,true)}}
async function act(name,action){if(action==='delete'&&!confirm('確定刪除 '+name+'？此操作無法復原。'))return;const url=apiPath(name)+(action==='preview'?'/preview':'');try{const response=await fetch(url,{method:action==='preview'?'POST':'DELETE',headers:{'X-Pico-Clock-API':'1'}}),data=await response.json();if(!response.ok)throw new Error(data.message||('HTTP '+response.status));show(action==='preview'?'已排入電子紙預覽':'已刪除 '+name,false);if(action==='delete')load()}catch(error){show(error.message,true)}}document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{document.querySelectorAll('.tab').forEach(item=>item.classList.remove('active'));tab.classList.add('active');kind=tab.dataset.kind;eventBox.style.display=kind==='events'?'inline':'none';load()});document.getElementById('reload').onclick=load;eventInput.onchange=load;load();
</script>
<script>
document.getElementById('notice').setAttribute('aria-live','polite');document.querySelector('.tabs').setAttribute('role','tablist');document.querySelectorAll('.tab').forEach((tab,index)=>{tab.setAttribute('role','tab');tab.setAttribute('aria-selected',index===0?'true':'false');tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(item=>item.setAttribute('aria-selected','false'));tab.setAttribute('aria-selected','true')})});eventInput.onchange=()=>{if(!/^\d{4}$/.test(eventInput.value.trim())){show('事件日期請使用 MMDD 格式',true);return}load()};
</script>
</body>
</html>
