<script>(function(){var k='iot-ui-theme',s=null;try{s=localStorage.getItem(k)}catch(e){}document.documentElement.dataset.theme=(s==='light'||s==='dark')?s:(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')})();</script>
<style>
:root{color-scheme:light;--paper:#f1ede2;--surface:#fbf8ef;--surface-2:#e7e3d6;--ink:#17231f;--ink-soft:#263a34;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--teal-dark:#07534f;--coral:#cf5a47;--coral-dark:#a94436;--amber:#bd812d;--amber-dark:#98641d;--inset:#fffdf7;--input-border:#7e9188;--placeholder:#9aa39b;--grid-dot:rgba(23,35,31,.045);--danger-surface:#fff6ed;--mint:#a8d2c4;--on-dark:#fbf8ef;--on-light:#17231f;--dark-block-muted:#aab8ae;--nav-border:#71847a;--on-ring:rgba(168,210,196,.18)}:root[data-theme="dark"]{color-scheme:dark;--paper:#141b18;--surface:#1c2622;--surface-2:#24312c;--ink:#eef1ea;--ink-soft:#0a100d;--line:#3a4a43;--muted:#93a69c;--teal:#1fae9c;--teal-dark:#167d70;--coral:#e2705a;--coral-dark:#b8543f;--amber:#d99a3f;--amber-dark:#a97a2f;--inset:#101512;--input-border:#48584f;--placeholder:#66756c;--grid-dot:rgba(255,255,255,.035);--danger-surface:#241a16}*{box-sizing:border-box}body{margin:0;background-color:var(--paper);background-image:linear-gradient(var(--grid-dot) 1px,transparent 1px),linear-gradient(90deg,var(--grid-dot) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh}.topbar{background:var(--ink-soft);border-bottom:5px solid var(--coral);color:var(--on-dark);padding:1rem}.topbar-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.7rem;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--mint);color:var(--mint);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:var(--dark-block-muted);font:400 .68rem Consolas,monospace;letter-spacing:.02em}.topbar-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}.nav{display:flex;gap:.4rem;flex-wrap:wrap}.nav a{border:1px solid var(--nav-border);color:var(--on-dark);padding:.46rem .6rem;text-decoration:none;font:700 .72rem Consolas,monospace}.nav a:hover,.nav a.active{background:var(--mint);border-color:var(--mint);color:var(--on-light)}.theme-toggle{display:flex;border:1px solid var(--nav-border);overflow:hidden}.theme-toggle button{border:0;border-radius:0;padding:.46rem .6rem;background:transparent;color:var(--on-dark);font:700 .68rem Consolas,monospace;cursor:pointer}.theme-toggle button+button{border-left:1px solid var(--nav-border)}.theme-toggle button.active{background:var(--mint);color:var(--on-light)}.wrap{max-width:1040px;margin:auto;padding:1.4rem 1rem 3rem}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.intro{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin:.4rem 0 1.25rem}.intro h1{font-size:clamp(2rem,6vw,4rem);line-height:.92;letter-spacing:-.06em;margin:.45rem 0 0}.intro p{max-width:34rem;margin:0;color:var(--muted);line-height:1.55}.storage{padding:.7rem .85rem;border-left:4px solid var(--mint);background:var(--ink-soft);color:var(--on-dark);font:700 .75rem Consolas,monospace;white-space:nowrap;box-shadow:4px 4px 0 var(--line)}.tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.65rem}.btn,.tab{border:1px solid var(--ink);border-radius:0;background:var(--surface);color:var(--ink);padding:.62rem .8rem;text-decoration:none;font:700 .76rem Consolas,monospace;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}.btn:hover,.tab:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}.tab.active{background:var(--teal);border-color:var(--teal-dark);color:#fff}.tab:focus-visible,.btn:focus-visible,.nav a:focus-visible,.theme-toggle button:focus-visible{outline:2px solid var(--mint);outline-offset:2px}.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;padding:.8rem;background:var(--surface-2);border:1px solid var(--line);margin-bottom:1rem}.controls input{width:92px;border:1px solid var(--input-border);border-radius:0;padding:.55rem .6rem;background:var(--inset);color:var(--ink);font:700 .8rem Consolas,monospace}.controls label{color:var(--muted);font:700 .72rem Consolas,monospace}.notice{display:none;margin:0 0 1rem;padding:.8rem 1rem;border:1px solid var(--teal);border-left:5px solid var(--teal);background:var(--surface);font:700 .8rem Consolas,monospace}.notice.error{border-color:var(--coral);color:var(--coral)}.panel{background:var(--surface);border:1px solid var(--ink);box-shadow:5px 5px 0 var(--line)}.panel-head{display:grid;grid-template-columns:1fr auto;padding:.75rem 1rem;border-bottom:1px solid var(--ink);font:700 .7rem Consolas,monospace;letter-spacing:.08em;color:var(--teal-dark)}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:1rem;align-items:center;padding:.9rem 1rem;border-bottom:1px dashed var(--line)}.row:last-child{border-bottom:0}.name{font:700 .88rem Consolas,monospace;overflow-wrap:anywhere}.meta{margin-top:.25rem;color:var(--muted);font:400 .72rem Consolas,monospace}.actions{display:flex;gap:.45rem}.actions .btn{padding:.42rem .55rem;box-shadow:none}.btn.danger{color:var(--coral);border-color:var(--coral);box-shadow:2px 2px 0 var(--coral)}.btn.danger:hover{background:var(--danger-surface)}.empty{padding:2.8rem 1rem;text-align:center;color:var(--muted);font-style:italic}.site-footer{background:var(--ink-soft);color:var(--dark-block-muted);margin-top:2rem;padding:1.2rem 1rem}.footer-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.footer-repo{display:flex;align-items:baseline;gap:.5rem;font:700 .74rem Consolas,monospace}.footer-repo .label{color:var(--mint);letter-spacing:.12em}.footer-repo a{color:var(--on-dark);text-decoration:none}.footer-meta{font:400 .7rem Consolas,monospace}button:disabled{opacity:.55;cursor:wait}@media(max-width:720px){.topbar-in,.intro{align-items:flex-start;flex-direction:column}.topbar-actions{align-items:flex-start}.storage{align-self:flex-start}.wrap{padding-top:1rem}}@media(max-width:560px){.row{grid-template-columns:1fr}.actions{justify-content:flex-start}.panel-head span:last-child{display:none}.footer-in{align-items:flex-start;flex-direction:column}}
</style><style>.topbar .logout{border:1px solid var(--nav-border);border-radius:0;background:transparent;color:var(--on-dark);padding:.46rem .6rem;font:700 .68rem Consolas,monospace;cursor:pointer}.topbar .logout:hover{background:var(--mint);color:var(--on-light)}</style>
<style>.tab.active{color:var(--on-dark)}</style>
</head>
<body>
<header class="topbar"><div class="topbar-in"><a class="brand" href="/"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a><div class="topbar-actions"><nav class="nav" aria-label="主導覽"><a href="/">設定</a><a href="/desk">書桌前分析</a><a href="/environment">環境紀錄</a><a class="active" href="/images">圖片庫</a></nav><div class="theme-toggle" role="group" aria-label="配色主題切換"><button type="button" data-theme-choice="light" aria-pressed="false">LIGHT</button><button type="button" data-theme-choice="dark" aria-pressed="false">DARK</button></div><button type="button" class="logout" id="logout">登出</button></div></div></header>
<main class="wrap"><div class="intro"><div><div class="kicker">03 / image library</div><h1>圖片庫</h1></div><div class="storage" id="storage">FREE / --</div></div><p class="intro-note">查看裝置中的電子紙素材、立即預覽，或移除不再使用的圖片。原圖轉檔與上傳請使用電腦端 Pico Image Tool。</p><div class="tabs" role="tablist"><button class="tab active" data-kind="custom" role="tab" aria-selected="true">CUSTOM</button><button class="tab" data-kind="events" role="tab" aria-selected="false">EVENTS</button><button class="tab" data-kind="login" role="tab" aria-selected="false">LOGIN</button></div><section class="controls"><span id="eventBox" class="is-hidden"><label for="event">EVENT / </label><input id="event" value="0101" maxlength="8" size="9"></span><button class="btn" id="reload" type="button">重新整理</button></section><div class="notice" id="notice" aria-live="polite"></div><section class="panel"><div class="panel-head"><span>FILE / SIZE</span><span>ACTIONS</span></div><div id="list"><div class="empty">讀取中…</div></div></section></main>
<footer class="site-footer"><div class="footer-in"><div class="footer-repo"><span class="label">SOURCE</span><a href="https://github.com/Ning0612/pico-paper-clock">Ning0612/pico-paper-clock</a></div><div class="footer-meta">Vanilla HTML／CSS／JS · 無框架 · MIT License</div></div></footer>
<script>
var kind='custom',loaded=false,csrf='',list=document.getElementById('list'),notice=document.getElementById('notice'),storage=document.getElementById('storage'),eventBox=document.getElementById('eventBox'),eventInput=document.getElementById('event');function syncTheme(){var cur=document.documentElement.dataset.theme;document.querySelectorAll('.theme-toggle button').forEach(function(b){var on=b.dataset.themeChoice===cur;b.classList.toggle('active',on);b.setAttribute('aria-pressed',on?'true':'false')})}function setTheme(value){if(value!=='light'&&value!=='dark')value='light';document.documentElement.dataset.theme=value;try{localStorage.setItem('iot-ui-theme',value)}catch(e){}syncTheme()}document.querySelectorAll('.theme-toggle button').forEach(function(b){b.onclick=function(){setTheme(b.dataset.themeChoice)}});syncTheme();function redirectLogin(){location.href='/login?next='+encodeURIComponent(location.pathname+location.search)}async function json(url,options,retried){var response=await fetch(url,options||{});if(response.status===401){redirectLogin();throw new Error('登入已過期')}var data={};try{data=await response.json()}catch(e){}if(!response.ok){var error=new Error(data.message||('HTTP '+response.status));error.code=data.error||'';if(error.code==='csrf'&&!retried&&options&&options.method){await refreshSession();var retryOptions=Object.assign({},options),headers=Object.assign({},options.headers||{});headers['X-CSRF-Token']=csrf;retryOptions.headers=headers;return json(url,retryOptions,true)}throw error}return data}async function refreshSession(){var session=await json('/api/v1/auth/session',{cache:'no-store'});csrf=session.csrf_token;return session}function show(text,error){notice.textContent=text;notice.className='notice'+(error?' error':'');notice.style.display='block'}function eventValue(){return eventInput.value.trim()||'0101'}function apiPath(name){if(kind==='events')return '/api/v1/images/events/'+encodeURIComponent(eventValue())+'/'+encodeURIComponent(name);return '/api/v1/images/'+kind+'/'+encodeURIComponent(name)}function sizeText(n){return n>=1024?(n/1024).toFixed(1)+' KiB':n+' B'}
async function load(){if(!loaded)list.innerHTML='<div class="empty">讀取中…</div>';var url='/api/v1/images?collection='+kind;if(kind==='events')url+='&event='+encodeURIComponent(eventValue());try{var data=await json(url);storage.textContent='FREE / '+(data.fs_free<0?'--':sizeText(data.fs_free));list.innerHTML='';if(!data.items.length){list.innerHTML='<div class="empty">這個分類目前沒有圖片</div>';loaded=true;return}data.items.forEach(function(item){var row=document.createElement('div'),info=document.createElement('div'),name=document.createElement('div'),meta=document.createElement('div'),actions=document.createElement('div'),preview=document.createElement('button'),remove=document.createElement('button');row.className='row';name.className='name';name.textContent=item.name;meta.className='meta';meta.textContent=sizeText(item.bytes)+(item.event?' / '+item.event:'');info.append(name,meta);actions.className='actions';preview.className='btn';preview.type='button';preview.textContent='預覽';preview.onclick=function(){act(item.name,'preview')};remove.className='btn danger';remove.type='button';remove.textContent='刪除';remove.onclick=function(){act(item.name,'delete')};actions.append(preview,remove);row.append(info,actions);list.append(row)});loaded=true;notice.style.display='none'}catch(error){if(!loaded)list.innerHTML='<div class="empty">目前無法讀取圖片清單</div>';show('暫時無法連線：'+error.message,true)}}
async function act(name,action){if(action==='delete'&&!confirm('確定刪除 '+name+'？此操作無法復原。'))return;var url=apiPath(name)+(action==='preview'?'/preview':'');try{var data=await json(url,{method:action==='preview'?'POST':'DELETE',headers:{'X-Pico-Clock-API':'1','X-CSRF-Token':csrf}});show(action==='preview'?'已排入電子紙預覽':'已刪除 '+name,false);if(action==='delete')load()}catch(error){show('操作失敗：'+error.message,true)}}
document.querySelectorAll('.tab').forEach(function(tab){tab.onclick=function(){document.querySelectorAll('.tab').forEach(function(item){item.classList.remove('active');item.setAttribute('aria-selected','false')});tab.classList.add('active');tab.setAttribute('aria-selected','true');kind=tab.dataset.kind;eventBox.className=kind==='events'?'':'is-hidden';load()}});document.getElementById('reload').onclick=load;eventInput.onchange=function(){if(!/^\d{4}$/.test(eventInput.value.trim())){show('事件日期請使用 MMDD 格式',true);return}load()};document.getElementById('logout').onclick=async function(){try{await json('/api/v1/auth/logout',{method:'POST',headers:{'X-CSRF-Token':csrf}});location.href='/login'}catch(error){show('登出失敗：'+error.message,true)}};
(async function(){try{await refreshSession();await load()}catch(error){show('載入管理工作階段失敗：'+error.message,true)}})();
</script>
</body>
</html>
