<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Clock 設定</title>
<style>
:root{--blue:#087ca7;--blue2:#075d78;--ink:#203039;--muted:#63747c;--paper:#edf2f1;--card:#fff;--line:#cbd7d5;--red:#b53b35;--amber:#b66a09}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Noto Serif TC',serif}.top{background:var(--ink);color:#fff;border-bottom:5px solid var(--blue);padding:1rem}.top-in{max-width:860px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.top h1{font-size:1.1rem;letter-spacing:.08em;margin:0}.top nav{display:flex;gap:.45rem}.top a{color:#fff;text-decoration:none;border:1px solid #718088;padding:.4rem .55rem;font:700 .72rem Consolas,monospace}.wrap{max-width:860px;margin:auto;padding:1rem}.profile-bar{display:grid;grid-template-columns:1fr auto auto;gap:.55rem;background:#dfe9e7;border:1px solid var(--line);padding:.8rem;margin-bottom:1rem}select,input,button{font:700 .88rem Consolas,monospace}select,input{width:100%;padding:.58rem;border:1px solid #7e9096;background:#fff}button{border:0;padding:.62rem .78rem;cursor:pointer;background:var(--blue);color:#fff}button:hover{background:var(--blue2)}button.danger{background:var(--red)}button.warn{background:var(--amber)}form{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.card{background:var(--card);border:1px solid var(--line);padding:1rem;box-shadow:4px 4px 0 #d6dfdd}.card h2{font-size:1rem;color:var(--blue2);margin:0 0 .9rem;padding-bottom:.55rem;border-bottom:2px solid var(--blue)}.field{margin-bottom:.8rem}.field:last-child{margin-bottom:0}label{display:block;font:700 .75rem Consolas,monospace;color:var(--muted);margin-bottom:.28rem}.check{display:flex;align-items:center;gap:.5rem}.check input{width:auto}.hint{font-size:.78rem;color:var(--muted);margin:.3rem 0 0}.wide{grid-column:1/-1}.actions{display:flex;gap:.6rem;flex-wrap:wrap}.actions button{flex:1;min-width:150px}.message{display:none;margin-bottom:1rem;padding:.8rem;background:#fff;border-left:5px solid var(--blue);font:700 .82rem Consolas,monospace}.message.error{border-color:var(--red);color:var(--red)}@media(max-width:680px){.top-in{align-items:flex-start;flex-direction:column}.profile-bar{grid-template-columns:1fr 1fr}.profile-bar select{grid-column:1/-1}form{grid-template-columns:1fr}.wide{grid-column:auto}}
</style>
</head>
<body>
<header class="top"><div class="top-in"><h1>PI PAPER CLOCK / CONTROL PANEL</h1><nav><a href="/dashboard">在席統計</a><a href="/images">圖片庫</a></nav></div></header>
<main class="wrap">
<div class="profile-bar"><select id="profiles"></select><button id="newProfile" type="button">新增</button><button id="deleteProfile" class="danger" type="button">刪除</button></div>
<div class="message" id="message"></div>
<form id="settings">
<input type="hidden" name="csrf_token" id="csrf"><input type="hidden" name="original_profile_name" id="originalName">
<section class="card"><h2>設定檔與 Wi-Fi</h2><div class="field"><label for="profileName">設定檔名稱</label><input id="profileName" name="profile_name" maxlength="32" required></div><div class="field"><label for="ssid">SSID</label><select id="ssid" name="ssid"></select></div><div class="field"><label for="password">Wi-Fi 密碼</label><input id="password" name="password" type="password" placeholder="留空保留原密碼"></div></section>
<section class="card"><h2>天氣與個人化</h2><div class="field"><label for="location">天氣地點</label><input id="location" name="location"></div><div class="field"><label for="birthday">生日 MMDD</label><input id="birthday" name="birthday" maxlength="4" pattern="[0-9]{4}"></div><div class="field"><label for="interval">圖片輪播間隔（分鐘）</label><input id="interval" name="image_interval_min" type="number" min="1" max="60"></div><div class="field"><label for="timezone">時區偏移</label><input id="timezone" name="timezone_offset" type="number" min="-12" max="14"></div></section>
<section class="card"><h2>感測與定時響聲</h2><div class="field"><label for="threshold">光感臨界值 0–65535</label><input id="threshold" name="light_threshold" type="number" min="0" max="65535"><p class="hint">目前 ADC：<span id="adc">--</span></p></div><div class="field check"><input id="chimeEnabled" name="chime_enabled" type="checkbox" value="true"><label for="chimeEnabled">啟用定時響聲</label></div><div class="field"><label for="chimeInterval">響聲間隔</label><select id="chimeInterval" name="chime_interval"><option value="hourly">每小時</option><option value="half_hourly">每半小時</option></select></div><div class="field"><label for="pitch">音高 Hz</label><input id="pitch" name="chime_pitch" type="number" min="100" max="5000"></div><div class="field"><label for="volume">音量 0–100</label><input id="volume" name="chime_volume" type="number" min="0" max="100"></div><button type="button" class="warn" id="testChime">測試響聲</button></section>
<section class="card"><h2>AP 與管理</h2><div class="field"><label for="apSsid">AP SSID</label><input id="apSsid" name="ap_mode_ssid"></div><div class="field"><label for="apPassword">AP 密碼</label><input id="apPassword" name="ap_mode_password" type="password" placeholder="留空保留原密碼"></div><div class="field"><label for="adminUser">LAN Admin 帳號</label><input id="adminUser" name="lan_admin_username"></div><div class="field"><label for="adminPassword">LAN Admin 密碼</label><input id="adminPassword" name="lan_admin_password" type="password" placeholder="留空保留原密碼"></div><div class="field"><label for="apiKey">OpenWeather API Key</label><input id="apiKey" name="api_key" type="password" placeholder="留空保留"></div><div class="field check"><input id="clearApiKey" name="clear_weather_api_key" type="checkbox" value="true"><label for="clearApiKey">清除已儲存的 Weather API Key</label></div><div class="field"><label for="discord">Discord Webhook</label><input id="discord" name="discord_webhook_url" type="password" placeholder="留空保留"></div><div class="field check"><input id="clearDiscord" name="clear_discord_webhook" type="checkbox" value="true"><label for="clearDiscord">清除已儲存的 Discord Webhook</label></div></section>
<section class="card wide"><h2>套用</h2><div class="actions"><button type="submit" id="save">儲存並重啟</button><button type="button" class="danger" id="factoryReset">完全重置</button></div></section>
</form>
</main>
<script>
const q=new URLSearchParams(location.search),selected=q.get('profile')||'',form=document.getElementById('settings'),message=document.getElementById('message');let config=null;
function note(text,error){message.textContent=text;message.className='message'+(error?' error':'');message.style.display='block'}
function setValue(id,value){document.getElementById(id).value=value==null?'':value}
async function load(){try{const suffix=selected?'?profile='+encodeURIComponent(selected):'';config=await fetch('/api/v1/config'+suffix,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});const p=config.profile,u=p.user||{},c=p.chime||{},g=config.global||{},profiles=document.getElementById('profiles');profiles.innerHTML='';config.profiles.forEach(name=>{const option=document.createElement('option');option.value=name;option.textContent=name+(name===config.active_profile?' / active':'');option.selected=name===p.name;profiles.append(option)});setValue('profileName',p.name);setValue('originalName',p.name);setValue('location',p.weather_location);setValue('birthday',u.birthday);setValue('interval',u.image_interval_min);setValue('timezone',u.timezone_offset);setValue('threshold',u.light_threshold);document.getElementById('chimeEnabled').checked=!!c.enabled;setValue('chimeInterval',c.interval);setValue('pitch',c.pitch);setValue('volume',c.volume);setValue('apSsid',g.ap_mode_ssid);setValue('adminUser',g.lan_admin_username);setValue('csrf',config.csrf_token);document.getElementById('apiKey').placeholder=g.weather_api_key_configured?'已設定；留空保留':'尚未設定';document.getElementById('discord').placeholder=g.discord_webhook_configured?'已設定；留空保留':'尚未設定';await loadNetworks(p.wifi&&p.wifi.ssid||'')}catch(error){note('載入設定失敗：'+error.message,true)}}
async function loadNetworks(current){try{const data=await fetch('/api/v1/networks').then(r=>r.json()),select=document.getElementById('ssid');select.innerHTML='';const names=data.networks.map(item=>typeof item==='string'?item:item.ssid);if(current&&!names.includes(current))names.unshift(current);names.forEach(name=>{const option=document.createElement('option');option.value=name;option.textContent=name;option.selected=name===current;select.append(option)})}catch(error){note('Wi-Fi 掃描失敗：'+error.message,true)}}
document.getElementById('profiles').onchange=e=>location.href='/?profile='+encodeURIComponent(e.target.value);
document.getElementById('newProfile').onclick=()=>{const name=prompt('新設定檔名稱');if(name&&name.trim())location.href='/new_profile?name='+encodeURIComponent(name.trim())+'&csrf_token='+encodeURIComponent(config.csrf_token)};
document.getElementById('deleteProfile').onclick=()=>{const name=document.getElementById('originalName').value;if(confirm('確定刪除 '+name+'？'))location.href='/delete_profile?name='+encodeURIComponent(name)+'&csrf_token='+encodeURIComponent(config.csrf_token)};
document.getElementById('testChime').onclick=()=>fetch('/test_chime?pitch='+encodeURIComponent(document.getElementById('pitch').value)+'&volume='+encodeURIComponent(document.getElementById('volume').value)+'&csrf_token='+encodeURIComponent(config.csrf_token)).then(()=>note('已送出測試響聲',false)).catch(e=>note(e.message,true));
document.getElementById('factoryReset').onclick=()=>{const answer=prompt('輸入 RESET 確認完全重置');if(answer==='RESET'&&confirm('最後確認：所有設定將被刪除'))location.href='/factory_reset?csrf_token='+encodeURIComponent(config.csrf_token)};
form.onsubmit=async event=>{event.preventDefault();const save=document.getElementById('save');save.disabled=true;save.textContent='儲存中…';try{const body=new URLSearchParams(new FormData(form));if(!document.getElementById('chimeEnabled').checked)body.delete('chime_enabled');const response=await fetch('/api/v1/config',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()}),data=await response.json();if(!response.ok)throw new Error(data.message||('HTTP '+response.status));note('設定已儲存，裝置正在重啟…',false)}catch(error){note(error.message,true);save.disabled=false;save.textContent='儲存並重啟'}};
function adc(){fetch('/adc').then(r=>r.json()).then(data=>document.getElementById('adc').textContent=data.adc).catch(()=>{})}load();adc();setInterval(adc,3000);
</script>
</body>
</html>
