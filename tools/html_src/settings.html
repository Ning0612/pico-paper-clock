<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Paper Clock / 設定</title>
<style>
:root{--ink:#17231f;--ink-soft:#263a34;--paper:#f1ede2;--surface:#fbf8ef;--surface-2:#e7e3d6;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--teal-dark:#07534f;--coral:#cf5a47;--amber:#bd812d;--mint:#a8d2c4;--shadow:rgba(23,35,31,.15)}
*{box-sizing:border-box}body{margin:0;background-color:var(--paper);background-image:linear-gradient(rgba(23,35,31,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(23,35,31,.045) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh}.topbar{background:var(--ink);border-bottom:5px solid var(--coral);color:var(--surface);padding:1rem}.topbar-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.7rem;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--mint);color:var(--mint);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:#aab8ae;font:400 .68rem Consolas,monospace;letter-spacing:.02em}.nav{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}.nav a{border:1px solid #71847a;color:var(--surface);padding:.46rem .6rem;text-decoration:none;font:700 .72rem Consolas,monospace;transition:background .15s,color .15s}.nav a:hover,.nav a.active{background:var(--mint);border-color:var(--mint);color:var(--ink)}.wrap{max-width:1040px;margin:auto;padding:1.4rem 1rem 3rem}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.intro{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin:.4rem 0 1.25rem}.intro h1{font-size:clamp(2rem,6vw,4rem);line-height:.92;letter-spacing:-.06em;margin:.45rem 0 0}.intro p{max-width:30rem;margin:0;color:var(--muted);line-height:1.55}.profile-strip{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:.55rem;padding:.8rem;background:var(--ink-soft);box-shadow:5px 5px 0 var(--line);margin-bottom:1rem}.profile-strip label{color:var(--mint);align-self:center;font:700 .72rem Consolas,monospace;letter-spacing:.08em}.profile-strip select{grid-column:1/-1}.message{display:none;margin-bottom:1rem;padding:.8rem 1rem;border:1px solid var(--teal);border-left:5px solid var(--teal);background:var(--surface);font:700 .8rem Consolas,monospace}.message.error{border-color:var(--coral);color:var(--coral)}form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}.card{position:relative;background:var(--surface);border:1px solid var(--ink);padding:1.05rem;box-shadow:5px 5px 0 var(--line)}.card::before{content:'';position:absolute;top:0;left:0;width:42px;height:4px;background:var(--teal)}.card h2{display:flex;align-items:baseline;gap:.55rem;margin:0 0 1rem;padding-bottom:.65rem;border-bottom:1px solid var(--line);font-size:1.05rem}.card h2 span{color:var(--coral);font:700 .7rem Consolas,monospace}.field{margin-bottom:.85rem}.field:last-child{margin-bottom:0}label{display:block;margin-bottom:.3rem;color:var(--muted);font:700 .72rem Consolas,monospace;letter-spacing:.03em}input,select,button{font:700 .88rem Consolas,monospace}input,select{width:100%;padding:.64rem .68rem;border:1px solid #7e9188;border-radius:0;background:#fffdf7;color:var(--ink)}input:focus,select:focus{outline:2px solid var(--mint);outline-offset:1px;border-color:var(--teal)}input::placeholder{color:#9aa39b;font-weight:400}.check{display:flex;align-items:flex-start;gap:.55rem;padding:.55rem 0}.check input{width:auto;margin:.1rem 0 0;accent-color:var(--teal);transform:scale(1.1)}.check label{margin:0;color:var(--ink);line-height:1.35}.hint{margin:.35rem 0 0;color:var(--muted);font:400 .76rem Consolas,monospace}.hint strong{color:var(--teal)}.wide{grid-column:1/-1}.actions{display:flex;gap:.6rem;flex-wrap:wrap}.actions button{flex:1;min-width:170px}button{border:1px solid var(--teal-dark);border-radius:0;padding:.7rem .85rem;cursor:pointer;background:var(--teal);color:#fff}.actions button:hover,.profile-strip button:hover{background:var(--teal-dark)}button.danger{border-color:var(--coral);background:var(--coral)}button.danger:hover{background:#a94436}button.warn{border-color:var(--amber);background:var(--amber)}button.warn:hover{background:#98641d}button:disabled{opacity:.55;cursor:wait}.danger-card{border-color:var(--coral);background:#fff6ed}.danger-card::before{background:var(--coral)}.danger-card h2{color:var(--coral)}.profile-strip button{min-width:92px}.section-note{margin:-.45rem 0 .9rem;color:var(--muted);font-size:.82rem;line-height:1.45}@media(max-width:720px){.topbar-in,.intro{align-items:flex-start;flex-direction:column}.nav{justify-content:flex-start}.profile-strip{grid-template-columns:1fr 1fr}.profile-strip label,.profile-strip select{grid-column:1/-1}.profile-strip button{width:100%}form{grid-template-columns:1fr}.wide{grid-column:auto}.wrap{padding-top:1rem}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-in"><a class="brand" href="/"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a><nav class="nav"><a class="active" href="/">設定</a><a href="/dashboard">在席統計</a><a href="/images">圖片庫</a></nav></div></header>
<main class="wrap">
<div class="intro"><div><div class="kicker">01 / configuration</div><h1>裝置設定</h1></div><p>管理時鐘的網路、顯示內容、感測器與提示音。儲存後裝置會自動重新啟動。</p></div>
<div class="profile-strip"><label for="profiles">CURRENT PROFILE</label><select id="profiles"></select><button id="newProfile" type="button">＋ 新增</button><button id="deleteProfile" class="danger" type="button">刪除</button></div>
<div class="message" id="message"></div>
<form id="settings">
<input type="hidden" name="csrf_token" id="csrf"><input type="hidden" name="original_profile_name" id="originalName">
<section class="card"><h2><span>01</span>設定檔與 Wi-Fi</h2><div class="field"><label for="profileName">設定檔名稱</label><input id="profileName" name="profile_name" maxlength="32" required></div><div class="field"><label for="ssid">SSID</label><select id="ssid" name="ssid"></select></div><div class="field"><label for="password">Wi-Fi 密碼</label><input id="password" name="password" type="password" placeholder="留空以保留原密碼"></div></section>
<section class="card"><h2><span>02</span>天氣與個人化</h2><p class="section-note">這些資料會影響電子紙上的日常資訊與圖片輪播。</p><div class="field"><label for="location">天氣地點</label><input id="location" name="location"></div><div class="field"><label for="birthday">生日 MMDD</label><input id="birthday" name="birthday" maxlength="4" pattern="[0-9]{4}"></div><div class="field"><label for="interval">圖片輪播間隔（分鐘）</label><input id="interval" name="image_interval_min" type="number" min="1" max="60"></div><div class="field"><label for="timezone">時區偏移</label><input id="timezone" name="timezone_offset" type="number" min="-12" max="14"></div></section>
<section class="card"><h2><span>03</span>感測與定時響聲</h2><div class="field"><label for="threshold">光感臨界值 0–65535</label><input id="threshold" name="light_threshold" type="number" min="0" max="65535"><p class="hint">目前 ADC：<strong id="adc">--</strong></p></div><div class="field check"><input id="chimeEnabled" name="chime_enabled" type="checkbox" value="true"><label for="chimeEnabled">啟用定時響聲</label></div><div class="field"><label for="chimeInterval">響聲間隔</label><select id="chimeInterval" name="chime_interval"><option value="hourly">每小時</option><option value="half_hourly">每半小時</option></select></div><div class="field"><label for="pitch">音高 Hz</label><input id="pitch" name="chime_pitch" type="number" min="100" max="5000"></div><div class="field"><label for="volume">音量 0–100</label><input id="volume" name="chime_volume" type="number" min="0" max="100"></div><button type="button" class="warn" id="testChime">播放測試響聲</button></section>
<section class="card"><h2><span>04</span>AP 與管理</h2><p class="section-note">管理 AP 模式與第三方服務的連線資訊。</p><div class="field"><label for="apSsid">AP SSID</label><input id="apSsid" name="ap_mode_ssid"></div><div class="field"><label for="apPassword">AP 密碼</label><input id="apPassword" name="ap_mode_password" type="password" placeholder="留空以保留原密碼"></div><div class="field"><label for="adminUser">LAN Admin 帳號</label><input id="adminUser" name="lan_admin_username"></div><div class="field"><label for="adminPassword">LAN Admin 密碼</label><input id="adminPassword" name="lan_admin_password" type="password" placeholder="留空以保留原密碼"></div><div class="field"><label for="apiKey">OpenWeather API Key</label><input id="apiKey" name="api_key" type="password" placeholder="留空以保留"></div><div class="field check"><input id="clearApiKey" name="clear_weather_api_key" type="checkbox" value="true"><label for="clearApiKey">清除已儲存的 Weather API Key</label></div><div class="field"><label for="discord">Discord Webhook</label><input id="discord" name="discord_webhook_url" type="password" placeholder="留空以保留"></div><div class="field check"><input id="clearDiscord" name="clear_discord_webhook" type="checkbox" value="true"><label for="clearDiscord">清除已儲存的 Discord Webhook</label></div></section>
<section class="card wide danger-card"><h2><span>05</span>套用變更</h2><p class="section-note">儲存會讓裝置立即重啟；危險操作則會清除所有設定檔。</p><div class="actions"><button type="submit" id="save">儲存並重啟</button><button type="button" class="danger" id="factoryReset">完全重置</button></div></section>
</form>
</main>
<script>
const q=new URLSearchParams(location.search),selected=q.get('profile')||'',form=document.getElementById('settings'),message=document.getElementById('message');let config=null;
function note(text,error){message.textContent=text;message.className='message'+(error?' error':'');message.style.display='block'}
function setValue(id,value){document.getElementById(id).value=value==null?'':value}
async function load(){try{const suffix=selected?'?profile='+encodeURIComponent(selected):'';config=await fetch('/api/v1/config'+suffix,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});const p=config.profile,u=p.user||{},c=p.chime||{},g=config.global||{},profiles=document.getElementById('profiles');profiles.innerHTML='';config.profiles.forEach(name=>{const option=document.createElement('option');option.value=name;option.textContent=name+(name===config.active_profile?' / active':'');option.selected=name===p.name;profiles.append(option)});setValue('profileName',p.name);setValue('originalName',p.name);setValue('location',p.weather_location);setValue('birthday',u.birthday);setValue('interval',u.image_interval_min);setValue('timezone',u.timezone_offset);setValue('threshold',u.light_threshold);document.getElementById('chimeEnabled').checked=!!c.enabled;setValue('chimeInterval',c.interval);setValue('pitch',c.pitch);setValue('volume',c.volume);setValue('apSsid',g.ap_mode_ssid);setValue('adminUser',g.lan_admin_username);setValue('csrf',config.csrf_token);document.getElementById('apiKey').placeholder=g.weather_api_key_configured?'已設定；留空保留':'尚未設定';document.getElementById('discord').placeholder=g.discord_webhook_configured?'已設定；留空保留':'尚未設定';await loadNetworks(p.wifi&&p.wifi.ssid||'')}catch(error){note('載入設定失敗：'+error.message,true)}}
async function loadNetworks(current){try{const data=await fetch('/api/v1/networks').then(r=>r.json()),select=document.getElementById('ssid');select.innerHTML='';const names=data.networks.map(item=>typeof item==='string'?item:item.ssid);if(current&&!names.includes(current))names.unshift(current);names.forEach(name=>{const option=document.createElement('option');option.value=name;option.textContent=name;option.selected=name===current;select.append(option)})}catch(error){note('Wi-Fi 掃描失敗：'+error.message,true)}}
document.getElementById('profiles').onchange=e=>location.href='/?profile='+encodeURIComponent(e.target.value);
document.getElementById('newProfile').onclick=()=>{const name=prompt('新設定檔名稱');if(name&&name.trim())location.href='/new_profile?name='+encodeURIComponent(name.trim())+'&csrf_token='+encodeURIComponent(config.csrf_token)};
document.getElementById('deleteProfile').onclick=()=>{const name=document.getElementById('originalName').value;if(confirm('確定刪除 '+name+'？'))location.href='/delete_profile?name='+encodeURIComponent(name)+'&csrf_token='+encodeURIComponent(config.csrf_token)};
document.getElementById('testChime').onclick=()=>fetch('/test_chime?pitch='+encodeURIComponent(document.getElementById('pitch').value)+'&volume='+encodeURIComponent(document.getElementById('volume').value)+'&csrf_token='+encodeURIComponent(config.csrf_token)).then(()=>note('已送出測試響聲',false)).catch(e=>note(e.message,true));
document.getElementById('factoryReset').onclick=()=>{const answer=prompt('輸入 RESET 確認完全重置');if(answer==='RESET'&&confirm('最後確認：所有設定將被刪除'))location.href='/factory_reset?csrf_token='+encodeURIComponent(config.csrf_token)};
form.onsubmit=async event=>{event.preventDefault();const save=document.getElementById('save');save.disabled=true;save.textContent='儲存中…';try{const body=new URLSearchParams(new FormData(form));if(!document.getElementById('chimeEnabled').checked)body.delete('chime_enabled');const response=await fetch('/api/v1/config',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()}),data=await response.json();if(!response.ok)throw new Error(data.message||('HTTP '+response.status));note('設定已儲存，裝置正在重啟…',false)}catch(error){note(error.message,true);save.disabled=false;save.textContent='儲存並重啟'}};
function adc(){fetch('/adc').then(r=>r.json()).then(data=>document.getElementById('adc').textContent=data.adc).catch(()=>{})}load();adc();setInterval(adc,3000);
</script>
<script>
document.getElementById('message').setAttribute('aria-live','polite');
const guardedSettingsActions=['newProfile','deleteProfile','testChime','save','factoryReset'];guardedSettingsActions.forEach(id=>{document.getElementById(id).disabled=true});const settingsReadyPoll=setInterval(()=>{if(config){guardedSettingsActions.forEach(id=>{document.getElementById(id).disabled=false});clearInterval(settingsReadyPoll)}},100);
</script>
</body>
</html>
