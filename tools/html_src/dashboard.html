<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>&#26700;&#21069;&#29376;&#24907;</title><style>:root{--primary:#1565c0;--danger:#c62828;--success:#2e7d32;--ink:#263238;--muted:#607d8b;--bg:#eef3f6;--card:#fff;--line:#d6e0e5;--wash:#f8fbfc}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink)}.top{background:#fff;border-bottom:2px solid var(--primary);padding:1rem;text-align:center}.top h2{margin:0;color:var(--primary);font-size:1.2rem}.main{padding:1rem}.container{max-width:920px;margin:auto;background:#fff;padding:1rem;border-radius:8px;box-shadow:0 3px 18px rgba(21,101,192,.12)}h1{text-align:center;color:var(--primary);margin:.25rem 0 1rem;font-size:1.8rem}fieldset{border:1px solid var(--line);border-radius:8px;margin:0 0 1rem;padding:1rem;background:var(--wash)}legend{font-weight:700;color:var(--primary);padding:0 .45rem}.btn{display:block;text-align:center;text-decoration:none;background:var(--primary);color:#fff;padding:.75rem;border-radius:6px;font-weight:700;margin-bottom:1rem}.metric-grid,.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem}.metric{background:#fff;border:1px solid var(--line);border-radius:6px;padding:.7rem;min-height:74px}.metric label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:.32rem}.metric span{display:block;color:var(--primary);font-size:1.28rem;font-weight:800}.state-on span{color:var(--success)}.state-off span{color:var(--danger)}.info{color:var(--muted);font-size:.85rem;line-height:1.45;margin:.75rem 0 0}.legend-row{display:flex;gap:1rem;flex-wrap:wrap;color:var(--muted);font-size:.85rem;margin:.4rem 0}.key{display:inline-block;width:.9rem;height:.9rem;border-radius:3px;margin-right:.35rem;vertical-align:-2px}.on{background:var(--success)}.off{background:var(--danger)}.unknown{background:#b0bec5}canvas{width:100%;height:230px;background:#fff;border:1px solid var(--line);border-radius:6px;margin-top:.35rem}table{width:100%;border-collapse:collapse;background:#fff;font-size:.9rem}th,td{padding:.55rem;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{color:var(--primary);font-size:.8rem}.table-wrap{overflow-x:auto}.pill{display:inline-block;min-width:2.2rem;text-align:center;border-radius:999px;color:#fff;padding:.12rem .45rem;font-weight:700}.pill.on{background:var(--success)}.pill.off{background:var(--danger)}@media(min-width:760px){.top{padding:1.25rem}.main{padding:1.5rem}.container{padding:1.35rem}.metric-grid{grid-template-columns:repeat(6,1fr)}.summary-grid{grid-template-columns:repeat(3,1fr)}}</style></head><body><div class="top"><h2>Pi Clock LAN Admin</h2></div><div class="main"><div class="container"><h1>&#26700;&#21069;&#29376;&#24907;</h1><a class="btn" href="/">&#22238;&#21040;&#35373;&#23450;</a><fieldset><legend>&#30446;&#21069;&#29376;&#24907;</legend><div class="metric-grid"><div class="metric" id="stateBox"><label>&#29376;&#24907;</label><span id="state">--</span></div><div class="metric"><label>&#20170;&#26085;&#32047;&#35336;</label><span id="today">--</span></div><div class="metric"><label>&#30446;&#21069;&#21312;&#27573;</label><span id="segment">--</span></div><div class="metric"><label>&#20170;&#26085;&#20999;&#25563;</label><span id="transitions">--</span></div><div class="metric"><label>ADC / &#38272;&#27323;</label><span id="adc">--</span></div><div class="metric"><label>&#26368;&#36817;&#20999;&#25563;</label><span id="lastChange">--</span></div></div><p class="info">ADC &#23567;&#26044;&#25110;&#31561;&#26044;&#30446;&#21069;&#35373;&#23450;&#27284;&#30340;&#20809;&#24863;&#33256;&#30028;&#20540;&#26178;&#65292;&#35352;&#28858;&#22312;&#26360;&#26700;&#21069;&#65307;&#20854;&#20182;&#26178;&#38291;&#35352;&#28858;&#38626;&#38283;&#12290;</p></fieldset><fieldset><legend>&#36817; 24 &#23567;&#26178;&#29376;&#24907;&#20999;&#25563;</legend><div class="legend-row"><span><i class="key on"></i>&#22312;&#26360;&#26700;&#21069;</span><span><i class="key off"></i>&#38626;&#38283;</span><span><i class="key unknown"></i>&#36039;&#26009;&#19981;&#36275;</span></div><canvas id="timeline" width="900" height="230"></canvas></fieldset><fieldset><legend>&#36817; 30 &#22825;&#22294;&#34920;</legend><div class="summary-grid"><div class="metric"><label>30 &#22825;&#24179;&#22343;</label><span id="avg30">--</span></div><div class="metric"><label>&#26368;&#39640;&#19968;&#22825;</label><span id="maxDay">--</span></div><div class="metric"><label>&#26368;&#36817;&#26377;&#35352;&#37636;</label><span id="daysCount">--</span></div></div><canvas id="dailyChart" width="900" height="280"></canvas></fieldset><fieldset><legend>&#27599;&#26085;&#32113;&#35336;</legend><div class="table-wrap"><table><thead><tr><th>&#26085;&#26399;</th><th>&#22312;&#26700;&#21069;</th><th>&#27604;&#20363;</th><th>&#20999;&#25563;&#27425;&#25976;</th></tr></thead><tbody id="daily"></tbody></table></div></fieldset><fieldset><legend>&#26368;&#36817;&#20999;&#25563;</legend><div class="table-wrap"><table><thead><tr><th>&#26178;&#38291;</th><th>&#29376;&#24907;</th><th>&#25345;&#32396;&#26178;&#38291;</th><th>ADC</th></tr></thead><tbody id="events"></tbody></table></div></fieldset></div></div><script>function fmt(s){s=Math.max(0,Number(s)||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h+'h '+m+'m'}function pct(s){return Math.round(Math.max(0,Math.min(86400,Number(s)||0))*100/864)/100+'%'}function dateText(d){return d&&d.length>=8?d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8):'--'}function timeText(t){return t&&t.length>=6?t.slice(0,2)+':'+t.slice(2,4)+':'+t.slice(4,6):'--'}function stateText(s){return s?'\u5728\u684c\u524d':'\u96e2\u958b'}function sortEvents(ev){return ev.filter(x=>x&&x.e>0).sort((a,b)=>a.e-b.e)}function rowState(s){return '<span class="pill '+(s?'on':'off')+'">'+stateText(s)+'</span>'}async function load(){try{const st=await fetch('/presence/status').then(r=>r.json()),ev=sortEvents(await fetch('/presence/events').then(r=>r.json())),da=await fetch('/presence/daily').then(r=>r.json());const now=Number(st.now_epoch)||Math.floor(Date.now()/1000);document.getElementById('state').textContent=stateText(st.state);document.getElementById('stateBox').className='metric '+(st.state?'state-on':'state-off');document.getElementById('today').textContent=fmt(st.today_seconds);document.getElementById('segment').textContent=fmt(st.segment_seconds||st.session_seconds);document.getElementById('transitions').textContent=st.transitions||0;document.getElementById('adc').textContent=st.adc+' / '+st.threshold;document.getElementById('lastChange').textContent=st.last_change_date?dateText(st.last_change_date)+' '+timeText(st.last_change_time):'--';renderDaily(da);renderEvents(ev,now,st);drawDaily(da);drawTimeline(ev,now,st)}catch(e){console.log(e)}}function renderDaily(da){const rows=da.slice(-30),sum=rows.reduce((a,x)=>a+(Number(x.sec)||0),0),max=rows.reduce((m,x)=>(Number(x.sec)||0)>(Number(m.sec)||0)?x:m,{sec:0,d:''});document.getElementById('avg30').textContent=rows.length?fmt(sum/rows.length):'--';document.getElementById('maxDay').textContent=max.d?dateText(max.d)+' '+fmt(max.sec):'--';document.getElementById('daysCount').textContent=rows.length;document.getElementById('daily').innerHTML=rows.reverse().map(x=>'<tr><td>'+dateText(x.d)+'</td><td>'+fmt(x.sec)+'</td><td>'+pct(x.sec)+'</td><td>'+x.n+'</td></tr>').join('')}function renderEvents(ev,now,st){const rows=ev.slice(-40).reverse().map((x,i,a)=>{const newer=a[i-1],end=newer?newer.e:now;return '<tr><td>'+dateText(x.d)+' '+timeText(x.t)+'</td><td>'+rowState(x.s)+'</td><td>'+fmt(end-x.e)+'</td><td>'+x.a+'</td></tr>'});document.getElementById('events').innerHTML=rows.join('')}let dailyBars=[];function drawDaily(da){const rows=da.slice(-30),c=document.getElementById('dailyChart'),g=c.getContext('2d'),w=c.width,h=c.height,p=44,chH=h-64;g.clearRect(0,0,w,h);g.fillStyle='#fff';g.fillRect(0,0,w,h);g.strokeStyle='#d6e0e5';g.fillStyle='#607d8b';g.font='12px sans-serif';for(let i=0;i<=4;i++){const y=20+chH*i/4;g.beginPath();g.moveTo(p,y);g.lineTo(w-14,y);g.stroke();g.fillText((24-6*i)+'h',8,y+4)}const bw=(w-p-18)/Math.max(1,rows.length);dailyBars=[];rows.forEach((r,i)=>{const sec=Number(r.sec)||0,bh=chH*Math.min(1,sec/86400),bx=p+4+i*bw,bw2=Math.max(3,bw-5);if(sec>0){g.fillStyle='#1565c0';g.fillRect(bx,h-44-bh,bw2,bh);dailyBars.push({x:bx,y:h-44-bh,w:bw2,h:bh,sec,d:r.d});if(r.d&&r.d.length>=8){g.fillStyle='#607d8b';g.font='10px sans-serif';g.textAlign='center';g.fillText(r.d.slice(4,6)+'/'+r.d.slice(6,8),bx+bw2/2,h-18);g.font='12px sans-serif';g.textAlign='left'}}});g.fillStyle='#607d8b';g.fillText('\u6700\u8fd1 30 \u5929\u6bcf\u65e5\u5728\u684c\u524d\u6642\u9593',p,16)}function initDailyTooltip(){const c=document.getElementById('dailyChart'),tip=document.getElementById('tip');if(!c||!tip)return;c.addEventListener('mousemove',function(e){const r=c.getBoundingClientRect();if(!r.width||!r.height)return;const sx=c.width/r.width,sy=c.height/r.height,mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;let f=false;for(const b of dailyBars){if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-36)+'px';tip.textContent=(b.d?dateText(b.d)+' ':'')+fmt(b.sec);f=true;break}}if(!f)tip.style.display='none'});c.addEventListener('mouseleave',function(){tip.style.display='none'})}function drawTimeline(ev,now,st){const c=document.getElementById('timeline'),g=c.getContext('2d'),w=c.width,h=c.height,start=now-86400,x0=70,x1=w-16,top=42,bh=48;g.clearRect(0,0,w,h);g.fillStyle='#fff';g.fillRect(0,0,w,h);g.font='12px sans-serif';g.fillStyle='#607d8b';for(let i=0;i<=6;i++){const x=x0+(x1-x0)*i/6;g.strokeStyle='#d6e0e5';g.beginPath();g.moveTo(x,28);g.lineTo(x,h-34);g.stroke();const te=now-(24-4*i)*3600,td=new Date(te*1e3),th=String(td.getHours()).padStart(2,'0'),tm=String(td.getMinutes()).padStart(2,'0');g.fillText(th+':'+tm,x-15,h-14)}g.fillStyle='#607d8b';g.fillText('\u5728\u684c\u524d',12,top+18);g.fillText('\u96e2\u958b',24,top+bh+34);drawBand(g,x0,x1,top,bh,'#eceff1');let intervals=[];for(let i=0;i<ev.length;i++){let a=ev[i],b=ev[i+1],from=Math.max(start,a.e),to=Math.min(now,b?b.e:now);if(to>start&&from<now)intervals.push({f:from,t:to,s:a.s})}if(intervals.length&&intervals[0].f>start){let first=intervals[0];intervals.unshift({f:start,t:first.f,s:first.s?0:1,u:1})}intervals.forEach(r=>{const xx=x0+(x1-x0)*(r.f-start)/86400,ww=(x1-x0)*(r.t-r.f)/86400,y=r.s?top:top+bh+16;drawBand(g,xx,xx+ww,y,bh,r.u?'#b0bec5':(r.s?'#2e7d32':'#c62828'))});g.fillStyle='#263238';g.fillText('\u6700\u8fd1 24 \u5c0f\u6642',x0,18)}function drawBand(g,x0,x1,y,h,color){g.fillStyle=color;g.fillRect(x0,y,Math.max(1,x1-x0),h);g.strokeStyle='#fff';g.strokeRect(x0,y,Math.max(1,x1-x0),h)}load();initDailyTooltip();setInterval(load,30000);</script><div id="tip" style="position:fixed;pointer-events:none;display:none;background:rgba(38,50,56,.92);color:#fff;padding:5px 10px;border-radius:6px;font-size:.82rem;z-index:999"></div></body></html>
