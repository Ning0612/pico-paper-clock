<!doctype html>
<html lang="zh-TW">

<meta charset="utf-8">

<title>Pi Paper Clock / 環境紀錄</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a100d'/%3E%3Crect x='2' y='2' width='28' height='28' fill='none' stroke='%23a8d2c4' stroke-width='2'/%3E%3Ctext x='16' y='21' font-family='Consolas,monospace' font-size='12' font-weight='700' fill='%23a8d2c4' text-anchor='middle'%3EPC%3C/text%3E%3C/svg%3E">
<script>(function(){var k='iot-ui-theme',s=null;try{s=localStorage.getItem(k)}catch(e){}document.documentElement.dataset.theme=(s==='light'||s==='dark')?s:(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')})();</script>
<style>
:root{color-scheme:light;--paper:#f1ede2;--surface:#fbf8ef;--surface-2:#e7e3d6;--ink:#17231f;--ink-soft:#263a34;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--teal-dark:#07534f;--coral:#cf5a47;--coral-dark:#a94436;--amber:#bd812d;--amber-dark:#98641d;--shadow:rgba(23,35,31,.15);--inset:#fffdf7;--input-border:#7e9188;--chart-grid:#d4d2c5;--unknown:#a9ada3;--placeholder:#9aa39b;--grid-dot:rgba(23,35,31,.045);--danger-surface:#fff6ed;--mint:#a8d2c4;--on-dark:#fbf8ef;--on-light:#17231f;--dark-block-muted:#aab8ae;--nav-border:#71847a;--on-ring:rgba(168,210,196,.18);--off-ring:rgba(207,90,71,.18)}:root[data-theme="dark"]{color-scheme:dark;--paper:#141b18;--surface:#1c2622;--surface-2:#24312c;--ink:#eef1ea;--ink-soft:#0a100d;--line:#3a4a43;--muted:#93a69c;--teal:#1fae9c;--teal-dark:#167d70;--coral:#e2705a;--coral-dark:#b8543f;--amber:#d99a3f;--amber-dark:#a97a2f;--shadow:rgba(0,0,0,.4);--inset:#101512;--input-border:#48584f;--chart-grid:#3a473f;--unknown:#6b756e;--placeholder:#66756c;--grid-dot:rgba(255,255,255,.035);--danger-surface:#241a16}*{box-sizing:border-box}body{margin:0;background-color:var(--paper);background-image:linear-gradient(var(--grid-dot) 1px,transparent 1px),linear-gradient(90deg,var(--grid-dot) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif;min-height:100vh}.topbar{background:var(--ink-soft);border-bottom:5px solid var(--coral);color:var(--on-dark);padding:1rem}.topbar-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.7rem;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--mint);color:var(--mint);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:var(--dark-block-muted);font:400 .68rem Consolas,monospace;letter-spacing:.02em}.topbar-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}.nav{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}.nav a{border:1px solid var(--nav-border);color:var(--on-dark);padding:.46rem .6rem;text-decoration:none;font:700 .72rem Consolas,monospace}.nav a:hover,.nav a.active{background:var(--mint);border-color:var(--mint);color:var(--on-light)}.theme-toggle{display:flex;border:1px solid var(--nav-border);overflow:hidden}.theme-toggle button{border:0;border-radius:0;padding:.46rem .6rem;background:transparent;color:var(--on-dark);font:700 .68rem Consolas,monospace;cursor:pointer}.theme-toggle button+button{border-left:1px solid var(--nav-border)}.theme-toggle button.active{background:var(--mint);color:var(--on-light)}.theme-toggle button:hover:not(.active){background:var(--on-ring)}.wrap{max-width:1040px;margin:auto;padding:1.4rem 1rem 3rem}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.intro{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin:.4rem 0 1.25rem}.intro h1{font-size:clamp(2rem,6vw,4rem);line-height:.92;letter-spacing:-.06em;margin:.45rem 0 0}.intro p{max-width:30rem;margin:0;color:var(--muted);line-height:1.55}.card{position:relative;background:var(--surface);border:1px solid var(--ink);padding:1.05rem;margin-bottom:1rem;box-shadow:5px 5px 0 var(--line)}.card:before{content:'';position:absolute;top:0;left:0;width:42px;height:4px;background:var(--teal)}.card h2{display:flex;align-items:baseline;gap:.55rem;margin:0 0 1rem;padding-bottom:.65rem;border-bottom:1px solid var(--line);font-size:1.05rem}.card h2 span{color:var(--coral);font:700 .7rem Consolas,monospace}.status-banner{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.1rem;margin-bottom:1rem;background:var(--ink-soft);color:var(--on-dark);box-shadow:5px 5px 0 var(--line)}.status-label{font:700 .7rem Consolas,monospace;letter-spacing:.12em;color:var(--mint)}.status-value{margin-top:.25rem;font-size:1.5rem}.updated{color:var(--dark-block-muted);font:400 .7rem Consolas,monospace;text-align:right}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}.metric{padding:.7rem;background:var(--inset);border:1px solid var(--line);min-height:78px;text-align:center}.metric label{display:block;color:var(--muted);font:700 .68rem Consolas,monospace;letter-spacing:.03em}.metric span{display:block;margin-top:.35rem;color:var(--teal);font:700 1.05rem Consolas,monospace;overflow-wrap:anywhere}.legend-row{display:flex;gap:1rem;flex-wrap:wrap;color:var(--muted);font:400 .75rem Consolas,monospace;margin:.4rem 0}.key{display:inline-block;width:.72rem;height:.72rem;margin-right:.3rem;vertical-align:-1px}.key.temp{background:var(--teal)}.key.hum{background:var(--coral)}canvas{display:block;width:100%;height:220px;margin-top:.5rem;background:var(--inset);border:1px solid var(--line)}.table-wrap{overflow-x:auto;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:var(--inset);font:400 .78rem Consolas,monospace}th,td{padding:.62rem .65rem;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{background:var(--surface-2);color:var(--teal-dark);font-size:.68rem;letter-spacing:.04em}tbody tr:last-child td{border-bottom:0}.message{display:none;margin-bottom:1rem;padding:.8rem 1rem;border:1px solid var(--teal);border-left:5px solid var(--teal);background:var(--surface);font:700 .8rem Consolas,monospace}.message.error{border-color:var(--coral);color:var(--coral)}.site-footer{background:var(--ink-soft);color:var(--dark-block-muted);margin-top:2rem;padding:1.2rem 1rem}.footer-in{max-width:1040px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.footer-repo{display:flex;align-items:baseline;gap:.5rem;font:700 .74rem Consolas,monospace}.footer-repo .label{color:var(--mint);letter-spacing:.12em}.footer-repo a{color:var(--on-dark);text-decoration:none}.footer-meta{font:400 .7rem Consolas,monospace}@media(min-width:760px){.metric-grid{grid-template-columns:repeat(6,1fr)}}@media(max-width:720px){.topbar-in,.intro{align-items:flex-start;flex-direction:column}.nav{justify-content:flex-start}.topbar-actions{align-items:flex-start}.status-banner{align-items:flex-start;flex-direction:column}.updated{text-align:left}.wrap{padding-top:1rem}}@media(max-width:480px){.metric-grid{grid-template-columns:repeat(2,1fr)}.footer-in{align-items:flex-start;flex-direction:column}}
</style>
<style>.topbar .logout{border:1px solid var(--nav-border);border-radius:0;background:transparent;color:var(--on-dark);padding:.46rem .6rem;font:700 .68rem Consolas,monospace;cursor:pointer}.topbar .logout:hover{background:var(--mint);color:var(--on-light)}.scale-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem}.scale-tabs button{border:1px solid var(--teal);border-radius:0;padding:.5rem .9rem;cursor:pointer;background:transparent;color:var(--teal);font:700 .72rem Consolas,monospace}.scale-tabs button.active{background:var(--teal);color:var(--on-dark)}.scale-tabs button:hover:not(.active){background:var(--on-ring)}.pagination{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-top:.75rem;font:700 .74rem Consolas,monospace}.pagination button.ghost{border:1px solid var(--teal);border-radius:0;padding:.7rem .85rem;cursor:pointer;background:transparent;color:var(--teal);font:700 .74rem Consolas,monospace}.pagination button.ghost:hover{background:var(--teal);color:var(--on-dark)}.pagination button:disabled{opacity:.55;cursor:wait}</style>
</head>
<body>
<header class="topbar"><div class="topbar-in"><a class="brand" href="/"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a><div class="topbar-actions"><nav class="nav" aria-label="主導覽"><a href="/">設定</a><a href="/desk">書桌前分析</a><a class="active" href="/environment">環境紀錄</a><a href="/images">圖片庫</a></nav><div class="theme-toggle" role="group" aria-label="配色主題切換"><button type="button" data-theme-choice="light" aria-pressed="false">LIGHT</button><button type="button" data-theme-choice="dark" aria-pressed="false">DARK</button></div><button type="button" class="logout ghost" id="logout">登出</button></div></div></header>
<main class="wrap">
<div class="intro"><div><div class="kicker">03 / environment log</div><h1>環境紀錄</h1></div><p>以 DHT22 感測器每 15 分鐘記錄一次溫濕度，原始資料保留 7 天、每日彙總保留 1 年。</p></div>
<div class="message error" id="errorNote" aria-live="polite"></div>
<section class="status-banner" id="statusBanner" aria-live="polite"><div><div class="status-label">CURRENT READING</div><div class="status-value" id="curTemp">--</div></div><div class="updated">目前濕度<br><strong id="curHum">--</strong></div></section>
<section class="card"><h2><span>01</span>今日總覽</h2><div class="metric-grid"><div class="metric"><label>目前溫度</label><span id="curTempMetric">--</span></div><div class="metric"><label>目前濕度</label><span id="curHumMetric">--</span></div><div class="metric"><label>今日溫度平均</label><span id="tAvg">--</span></div><div class="metric"><label>今日濕度平均</label><span id="hAvg">--</span></div><div class="metric"><label>今日溫度範圍</label><span id="tRange">--</span></div><div class="metric"><label>今日濕度範圍</label><span id="hRange">--</span></div></div></section>
<section class="card"><h2><span>02</span>趨勢圖</h2><div class="scale-tabs" role="group" aria-label="時間範圍切換"><button type="button" data-scale="day" class="active">日</button><button type="button" data-scale="week">週</button><button type="button" data-scale="month">月</button><button type="button" data-scale="year">年</button></div><div class="legend-row"><span><i class="key temp"></i>溫度 (°C)</span><span><i class="key hum"></i>濕度 (%)</span></div><canvas id="envTempChart" width="900" height="220" aria-label="溫度趨勢圖"></canvas><canvas id="envHumChart" width="900" height="220" aria-label="濕度趨勢圖"></canvas></section>
<section class="card"><h2><span>03</span>每日統計</h2><div class="table-wrap"><table><thead><tr><th>日期</th><th>溫度範圍</th><th>溫度平均</th><th>濕度範圍</th><th>濕度平均</th><th>取樣數</th></tr></thead><tbody id="daily" aria-live="polite"></tbody></table></div><div class="pagination"><button type="button" class="ghost" id="dailyPrev">上一頁</button><span id="dailyPageLabel">第 1 / 1 頁</span><button type="button" class="ghost" id="dailyNext">下一頁</button></div></section>
</main>
<footer class="site-footer"><div class="footer-in"><div class="footer-repo"><span class="label">SOURCE</span><a href="https://github.com/Ning0612/pico-paper-clock">Ning0612/pico-paper-clock</a></div><div class="footer-meta" id="sampleTime">最後更新：--</div></div></footer>
<script>
var sampleData=[],dailyData=[],statusData=null,chartNow=0,dailyPage=1,loading=false,scale='day';
function syncTheme(){var cur=document.documentElement.dataset.theme;document.querySelectorAll('.theme-toggle button').forEach(function(b){var on=b.dataset.themeChoice===cur;b.classList.toggle('active',on);b.setAttribute('aria-pressed',on?'true':'false')})}function setTheme(value){if(value!=='light'&&value!=='dark')value='light';document.documentElement.dataset.theme=value;try{localStorage.setItem('iot-ui-theme',value)}catch(e){}syncTheme();if(statusData)drawScale()}document.querySelectorAll('.theme-toggle button').forEach(function(b){b.onclick=function(){setTheme(b.dataset.themeChoice)}});syncTheme();
function color(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}function fmt1(v){return (v===null||v===undefined||!isFinite(Number(v)))?'--':Number(v).toFixed(1)}function dateText(d){return /^\d{8}$/.test(String(d||''))?d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8):'--'}function monthDayText(d){return /^\d{8}$/.test(String(d||''))?d.slice(4,6)+'/'+d.slice(6,8):'--'}function tmText(t){return /^\d{4}$/.test(String(t||''))?t.slice(0,2)+':'+t.slice(2,4):'--'}
function redirectLogin(){location.href='/login?next='+encodeURIComponent(location.pathname+location.search)}async function json(url,options,retried){var response=await fetch(url,options||{cache:'no-store'});if(response.status===401){redirectLogin();throw new Error('登入已過期')}var data={};try{data=await response.json()}catch(e){}if(!response.ok){var error=new Error(data.message||('HTTP '+response.status));error.code=data.error||'';if(error.code==='csrf'&&!retried&&options&&options.method){var session=await json('/api/v1/auth/session',{cache:'no-store'});var retryOptions=Object.assign({},options),headers=Object.assign({},options.headers||{});headers['X-CSRF-Token']=session.csrf_token;retryOptions.headers=headers;return json(url,retryOptions,true)}throw error}return data}
function showError(text){var box=document.getElementById('errorNote');box.textContent=text;box.style.display='block'}
function fitCanvas(c){var rect=c.getBoundingClientRect(),cssW=rect.width||c.clientWidth||900,cssH=rect.height||c.clientHeight||parseFloat(getComputedStyle(c).height)||Number(c.getAttribute('height'))||150,dpr=window.devicePixelRatio||1;c.width=Math.max(1,Math.round(cssW*dpr));c.height=Math.max(1,Math.round(cssH*dpr));var g=c.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);return{g:g,w:cssW,h:cssH}}
function scaleRows(){if(scale==='day'){var cutoff=chartNow-86400;return sampleData.filter(function(r){return Number(r.e)>=cutoff}).map(function(r){return{label:tmText(r.tm),t:r.t,h:r.h}})}if(scale==='week'){return sampleData.slice().sort(function(a,b){return a.e-b.e}).map(function(r){return{label:monthDayText(r.d),t:r.t,h:r.h}})}if(scale==='month'){return dailyData.slice(-30).map(function(r){return{label:monthDayText(r.d),t:r.tavg,h:r.havg}})}var months={};dailyData.forEach(function(r){if(!/^\d{8}$/.test(String(r.d||'')))return;var mk=r.d.slice(0,6);if(!months[mk])months[mk]={tsum:0,hsum:0,n:0};months[mk].tsum+=Number(r.tavg)||0;months[mk].hsum+=Number(r.havg)||0;months[mk].n++});return Object.keys(months).sort().map(function(mk){var m=months[mk];return{label:mk.slice(4,6)+'月',t:m.n?m.tsum/m.n:null,h:m.n?m.hsum/m.n:null}})}
function drawChart(canvasId,rows,field,colorVar,title){var c=document.getElementById(canvasId),fit=fitCanvas(c),g=fit.g,w=fit.w,h=fit.h,p=44,chH=h-46,ink=color('--ink'),inset=color('--inset'),grid=color('--chart-grid'),muted=color('--muted'),lineColor=color(colorVar);g.clearRect(0,0,w,h);g.fillStyle=inset;g.fillRect(0,0,w,h);var values=rows.map(function(r){return Number(r[field])}).filter(function(v){return isFinite(v)});g.font='12px Consolas,monospace';if(!values.length){g.fillStyle=muted;g.fillText('尚無資料',p,h/2);return}var vMin=Math.min.apply(null,values),vMax=Math.max.apply(null,values);if(vMin===vMax){vMin-=1;vMax+=1}var pad=(vMax-vMin)*0.1;vMin-=pad;vMax+=pad;g.strokeStyle=grid;g.fillStyle=muted;g.font='11px Consolas,monospace';for(var i=0;i<=4;i++){var y=16+chH*i/4,val=vMax-(vMax-vMin)*i/4;g.beginPath();g.moveTo(p,y);g.lineTo(w-10,y);g.stroke();g.fillText(val.toFixed(1),4,y+4)}var x0=p,x1=w-10,plotW=x1-x0;g.beginPath();g.strokeStyle=lineColor;g.lineWidth=2;var started=false;rows.forEach(function(r,index){var v=Number(r[field]);if(!isFinite(v))return;var x=x0+(rows.length>1?plotW*index/(rows.length-1):plotW/2),y=16+chH*(1-(v-vMin)/(vMax-vMin));if(!started){g.moveTo(x,y);started=true}else g.lineTo(x,y)});g.stroke();g.lineWidth=1;var labelStep=Math.max(1,Math.ceil(rows.length/8));g.fillStyle=muted;g.textAlign='center';rows.forEach(function(r,index){if(index%labelStep===0||index===rows.length-1)g.fillText(r.label,x0+(rows.length>1?plotW*index/(rows.length-1):plotW/2),h-6)});g.textAlign='left';g.fillStyle=ink;g.font='12px Consolas,monospace';g.fillText(title,p,12)}
function drawScale(){var rows=scaleRows();drawChart('envTempChart',rows,'t','--teal','溫度趨勢 (°C)');drawChart('envHumChart',rows,'h','--coral','濕度趨勢 (%)')}
function setScale(value){scale=value;document.querySelectorAll('.scale-tabs button').forEach(function(b){b.classList.toggle('active',b.dataset.scale===value)});drawScale()}
document.querySelectorAll('.scale-tabs button').forEach(function(b){b.onclick=function(){setScale(b.dataset.scale)}});
function renderDaily(data){var rows=(data||[]).slice().reverse(),totalPages=Math.max(1,Math.ceil(rows.length/10));if(dailyPage>totalPages)dailyPage=totalPages;document.getElementById('daily').innerHTML=rows.slice((dailyPage-1)*10,dailyPage*10).map(function(x){return '<tr><td>'+dateText(x.d)+'</td><td>'+fmt1(x.tmin)+' ~ '+fmt1(x.tmax)+'</td><td>'+fmt1(x.tavg)+'</td><td>'+fmt1(x.hmin)+' ~ '+fmt1(x.hmax)+'</td><td>'+fmt1(x.havg)+'</td><td>'+x.n+'</td></tr>'}).join('');document.getElementById('dailyPageLabel').textContent='第 '+dailyPage+' / '+totalPages+' 頁';document.getElementById('dailyPrev').disabled=dailyPage<=1;document.getElementById('dailyNext').disabled=dailyPage>=totalPages}
document.getElementById('dailyPrev').onclick=function(){if(dailyPage>1){dailyPage--;renderDaily(dailyData)}};document.getElementById('dailyNext').onclick=function(){dailyPage++;renderDaily(dailyData)};
async function load(){if(loading)return;loading=true;try{var st=await json('/api/env/status'),sa=await json('/api/env/samples'),da=await json('/api/env/daily'),now=Number(st.now_epoch)||Math.floor(Date.now()/1000);statusData=st;sampleData=sa||[];dailyData=da||[];chartNow=now;document.getElementById('errorNote').style.display='none';document.getElementById('curTemp').textContent=fmt1(st.temp)+'°C';document.getElementById('curHum').textContent=fmt1(st.hum)+'%';document.getElementById('curTempMetric').textContent=fmt1(st.temp)+'°C';document.getElementById('curHumMetric').textContent=fmt1(st.hum)+'%';document.getElementById('tAvg').textContent=fmt1(st.t_avg)+'°C';document.getElementById('hAvg').textContent=fmt1(st.h_avg)+'%';document.getElementById('tRange').textContent=fmt1(st.t_min)+' ~ '+fmt1(st.t_max)+'°C';document.getElementById('hRange').textContent=fmt1(st.h_min)+' ~ '+fmt1(st.h_max)+'%';document.getElementById('sampleTime').textContent='最後更新：'+(now?new Date(now*1000).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}):'--');renderDaily(da);drawScale()}catch(error){showError('暫時無法連線：'+error.message)}finally{loading=false}}
document.getElementById('logout').onclick=async function(){try{var session=await json('/api/v1/auth/session',{cache:'no-store'});await json('/api/v1/auth/logout',{method:'POST',headers:{'X-CSRF-Token':session.csrf_token}});location.href='/login'}catch(error){showError('登出失敗：'+error.message)}};
(async function(){try{await json('/api/v1/auth/session');await load();setInterval(load,30000)}catch(error){showError('載入管理工作階段失敗：'+error.message)}})();
</script>
</body>
</html>
