<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Paper Clock / 設定完成</title>
<style>
:root{--ink:#17231f;--paper:#f1ede2;--surface:#fbf8ef;--line:#b9b8aa;--muted:#68736c;--teal:#0b716a;--coral:#cf5a47;--mint:#a8d2c4}*{box-sizing:border-box}body{margin:0;min-height:100vh;background-color:var(--paper);background-image:linear-gradient(rgba(23,35,31,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(23,35,31,.045) 1px,transparent 1px);background-size:20px 20px;color:var(--ink);font-family:Georgia,'Noto Serif TC',serif}.topbar{background:var(--ink);border-bottom:5px solid var(--teal);color:var(--surface);padding:1rem}.brand{display:flex;align-items:center;gap:.7rem;max-width:1040px;margin:auto;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.25rem;height:2.25rem;border:2px solid var(--mint);color:var(--mint);font:700 1rem Consolas,monospace}.brand-copy{font:700 .82rem Consolas,monospace;letter-spacing:.08em}.brand-sub{display:block;margin-top:.22rem;color:#aab8ae;font:400 .68rem Consolas,monospace}.wrap{max-width:700px;margin:auto;padding:4rem 1rem}.card{position:relative;background:var(--surface);border:1px solid var(--ink);padding:2rem 1.5rem;text-align:center;box-shadow:7px 7px 0 var(--line)}.card::before{content:'';position:absolute;top:0;left:0;width:70px;height:5px;background:var(--teal)}.kicker{color:var(--teal);font:700 .72rem Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}h1{font-size:clamp(2rem,7vw,3.5rem);line-height:.95;letter-spacing:-.06em;margin:.55rem 0 1rem}p{color:var(--muted);line-height:1.6;margin:.5rem auto;max-width:34rem}.countdown{margin:1.7rem 0 .8rem;color:var(--teal);font:700 4.4rem/.9 Consolas,monospace}.progress-bar{height:8px;max-width:320px;margin:1rem auto 1.3rem;background:#d6d2c5;overflow:hidden}.progress-fill{height:100%;width:100%;background:var(--teal);animation:countdown 5s linear forwards}@keyframes countdown{to{width:0}}.redirect{font:700 .72rem Consolas,monospace;color:var(--muted)}
</style>
</head>
<body><header class="topbar"><a class="brand" href="/"><span class="brand-mark">PC</span><span class="brand-copy">PI PAPER CLOCK<span class="brand-sub">LOCAL DEVICE / CONTROL DECK</span></span></a></header><main class="wrap"><section class="card"><div class="kicker">CONFIGURATION / SAVED</div><h1>設定已儲存</h1><p>系統正在重新啟動，裝置會在啟動後自動連接 Wi-Fi。</p><div class="countdown" id="countdown">5</div><div class="progress-bar"><div class="progress-fill"></div></div><p class="redirect">請稍候，頁面會自動返回設定…</p></section></main><script>let t=5;const el=document.getElementById('countdown');setInterval(()=>{t--;if(t>=0)el.innerText=t},1000);setTimeout(()=>{window.location.href='/'},5000)</script></body>
</html>
