name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build generated HTML assets
        run: python tools/build_html.py

      - name: Check generated HTML assets are current
        shell: bash
        run: |
          git diff --exit-code -- src/html

          html_names=$(find tools/html_src -maxdepth 1 -type f -name '*.html' -printf '%f\n' | sed 's/\.html$//' | sort)
          bin_names=$(find src/html -maxdepth 1 -type f -name '*.bin' -printf '%f\n' | sed 's/\.bin$//' | sort)
          if [[ "${html_names}" != "${bin_names}" ]]; then
            echo 'Generated HTML asset names do not match source HTML names.'
            diff -u <(printf '%s\n' "${html_names}") <(printf '%s\n' "${bin_names}") || true
            exit 1
          fi

          if [[ -n "$(git status --porcelain --untracked-files=all -- src/html)" ]]; then
            echo 'Generated HTML assets contain untracked or modified files.'
            git status --short -- src/html
            exit 1
          fi

      - name: Compile host-side Python
        run: python -m compileall tools tests upload.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
